<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#c97b4b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Tag Scanner</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <h1>Tag Scanner</h1>
    <a href="/settings" class="icon-btn" title="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </a>
  </header>

  <main>
    <!-- Scanner -->
    <div class="scan-area">
      <div id="preview-container">
        <video id="video" autoplay playsinline muted class="hidden"></video>
        <img id="preview-img" alt="Captured tag" class="hidden">
        <div class="scan-overlay">
          <div class="scan-frame"></div>
        </div>
        <div class="scan-placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 12h8M12 8v8"/>
          </svg>
          Tap Camera or Upload to scan a tag
        </div>
      </div>
      <div class="scan-controls">
        <button class="btn btn-primary" id="btn-camera">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          Camera
        </button>
        <button class="btn btn-primary" id="btn-capture" disabled>
          <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="9"/></svg>
          Capture
        </button>
        <button class="btn btn-secondary" id="btn-upload">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          Upload
        </button>
      </div>
    </div>

    <input type="file" id="file-input" accept="image/*" style="display:none">

    <!-- Status -->
    <div id="status-bar">
      <div class="spinner"></div>
      <span id="status-msg">Processing...</span>
    </div>

    <!-- Result -->
    <div id="result-card">
      <h2>Parsed Tag</h2>
      <div class="ocr-raw-label">Raw OCR text</div>
      <div class="ocr-raw" id="ocr-raw"></div>
      <div class="field-group">
        <div class="field">
          <label for="field-name">Item Name</label>
          <input type="text" id="field-name" placeholder="e.g. Watercolor Fox">
        </div>
        <div class="field">
          <label for="field-price">Price ($)</label>
          <input type="text" id="field-price" inputmode="decimal" placeholder="e.g. 24.00">
        </div>
      </div>
      <div class="result-actions">
        <button class="btn btn-primary" id="btn-save">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
          </svg>
          Save Local
        </button>
        <button class="btn btn-success" id="btn-stripe">
          Save + Stripe
        </button>
        <button class="btn btn-secondary" id="btn-discard">Discard</button>
      </div>
    </div>

    <!-- Records -->
    <div id="records-section">
      <h2>
        Records
        <button class="btn btn-outline" id="btn-export" style="font-size:0.8rem;padding:0.35rem 0.75rem;">Export CSV</button>
      </h2>
      <div id="records-list"></div>
    </div>
  </main>

  <div id="toast"></div>

  <!-- Tesseract.js from CDN (no build step needed) -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
